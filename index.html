<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fb Gen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --primary: #2ea043;
            --secondary: #f0f6fc; --accent: #bf40bf; --border: #30363d;
            --fb-blue: #1877f2;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); color: var(--secondary); 
            margin: 0; padding: 20px; display: flex; justify-content: center;
        }

        .dashboard {
            width: 100%; max-width: 600px; background: var(--card);
            border: 1px solid var(--border); border-radius: 12px; padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .header h1 i { color: var(--fb-blue); margin-right: 5px; }
        
        .alert-box {
            background: rgba(255, 165, 0, 0.1); border: 1px solid #ffa500;
            color: #ffa500; padding: 12px; border-radius: 8px; font-size: 13px;
            margin-bottom: 20px; line-height: 1.4;
        }

        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        
        .selectors-row { display: flex; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
        .custom-select {
            flex: 1; min-width: 120px; background: var(--bg); border: 1px solid var(--border);
            color: white; padding: 10px; border-radius: 6px; outline: none; font-size: 12px;
        }

        .mode-container { display: flex; gap: 10px; margin-bottom: 10px; }
        .mode-btn-toggle { 
            flex: 1; background: #21262d; color: #8b949e; border: 1px solid var(--border); 
            padding: 10px; font-size: 11px; border-radius: 6px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .mode-btn-toggle.active { background: var(--fb-blue); color: white; border-color: #58a6ff; }

        #manual-inputs-container { 
            display: none; flex-direction: column; gap: 8px; margin: 5px 0 15px 0; 
            padding: 12px; background: #0d1117; border-radius: 8px; border: 1px solid var(--border);
        }
        .manual-row { display: flex; gap: 8px; width: 100%; box-sizing: border-box; }
        .manual-row input { 
            flex: 1; width: 48%; background: #161b22; border: 1px solid var(--border); 
            color: white; padding: 10px; border-radius: 6px; font-size: 12px; outline: none;
        }
        .manual-row input:focus { border-color: var(--primary); }

        .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

        button {
            flex: 1; padding: 12px; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        #genBtn { background: var(--primary); color: white; position: relative; min-width: 200px; }
        #genBtn:disabled { opacity: 0.6; cursor: not-allowed; background: #216e39; }

        #copyBtn { background: #30363d; color: white; border: 1px solid var(--border); }
        #downloadBtn { background: #1f6feb; color: white; border: 1px solid #388bfd66; }
        #clearBtn { background: #f8514922; color: #f85149; border: 1px solid #f8514944; margin-top: 15px; font-size: 11px; padding: 8px; width: 100%; }

        .batch-info { text-align: center; font-size: 11px; color: #8b949e; margin-top: 5px; }

        .long-cooldown {
            display: none; text-align: center; color: #f85149;
            font-weight: bold; font-size: 14px; margin-top: 10px;
            padding: 10px; border: 1px dashed #f85149; border-radius: 8px;
        }

        .account-card {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 15px; margin-bottom: 15px;
            position: relative; animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .name { color: var(--primary); font-size: 18px; font-weight: bold; }
        .otp-badge { background: var(--accent); color: white; padding: 4px 10px; border-radius: 4px; font-weight: 900; font-size: 18px; }

        .details { font-size: 13px; color: #8b949e; line-height: 2.2; }
        .details b { color: #fff; }
        .icon-w { width: 20px; text-align: center; margin-right: 5px; color: var(--primary); }

        .copy-inline { cursor: pointer; margin-left: 8px; color: #8b949e; font-size: 12px; transition: 0.2s; }
        .copy-inline:hover { color: var(--primary); }

        .card-actions { display: flex; gap: 8px; margin-top: 12px; }
        .otp-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); font-size: 11px; flex: 1; }
        .visit-btn { background: #30363d; border: 1px solid var(--border); color: white; font-size: 11px; flex: 1; }

        #status { text-align: center; font-size: 12px; color: #8b949e; margin-bottom: 10px; }
        .history-label { font-size: 12px; color: #8b949e; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .history-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1><i class="fab fa-facebook"></i> AutoCreate Fb</h1>
    </div>

    <div class="alert-box">
        <i class="fas fa-info-circle"></i> If your device is not banned, get the code and use it for the account. Use manual mode for specific names.
    </div>

    <div class="mode-container">
        <button id="mode-random" class="mode-btn-toggle active" onclick="switchMode('random')">RANDOM NAME</button>
        <button id="mode-manual" class="mode-btn-toggle" onclick="switchMode('manual')">MANUALLY NAME</button>
    </div>

    <div id="status">System Ready</div>

    <div class="controls">
        <div class="selectors-row">
            <select id="domainChoice" class="custom-select">
                <option value="random">Random Domain</option>
                <option value="timpmeyl.indevs.in">@timpmeyl.indevs.in</option>
                <option value="nmeyl.indevs.in">@nmeyl.indevs.in</option>
                <option value="hypermeyl.indevs.in">@hypermeyl.indevs.in</option>
                <option value="qnmeyl.indevs.in">@qnmeyl.indevs.in</option>
                <option value="nqnmeyl.indevs.in">@nqnmeyl.indevs.in</option>
            </select>
            
            <select id="yearChoice" class="custom-select">
                <option value="1990-2013">1990 - 2013 (All)</option>
                <option value="1990-1999">1990 - 1999 (Classic)</option>
                <option value="2000-2013">2000 - 2013 (Gen-Z)</option>
            </select>

            <select id="accQuantity" class="custom-select" onchange="generateManualInputs()">
                <option value="1">1 Account</option>
                <option value="2">2 Accounts</option>
                <option value="3">3 Accounts</option>
                <option value="4">4 Accounts</option>
                <option value="5" selected>5 Accounts</option>
            </select>
        </div>

        <div id="manual-inputs-container"></div>

        <div class="btn-row">
            <button id="genBtn" onclick="generateBatch()">
                <i class="fas fa-plus-circle"></i> <span id="btnText">GENERATE (5 REMAINING)</span>
            </button>
        </div>
        <div class="btn-row">
            <button id="copyBtn" onclick="copyAllAccounts()">
                <i class="fas fa-copy"></i> COPY ALL
            </button>
            <button id="downloadBtn" onclick="downloadAccounts()">
                <i class="fas fa-download"></i> DOWNLOAD .TXT
            </button>
        </div>
        <div class="batch-info" id="sessionInfo">5 batches allowed before 30-min cooldown.</div>
        <div id="longWait" class="long-cooldown">
            <i class="fas fa-hourglass-half"></i> System Cooling Down: <span id="longTimer">30:00</span>
        </div>
    </div>

    <div class="history-label">Account List / History</div>
    <div id="account-list"></div>
    <button id="clearBtn" onclick="clearHistory()"><i class="fas fa-trash"></i> CLEAR ALL HISTORY</button>
</div>

<script>
    let accounts = JSON.parse(localStorage.getItem('fb_history')) || [];
    let batchesLeft = localStorage.getItem('batches_left') !== null ? parseInt(localStorage.getItem('batches_left')) : 5;
    let currentMode = 'random';

    render();
    updateButtonText();
    checkCooldownOnLoad();
    generateManualInputs();

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('mode-random').classList.toggle('active', mode === 'random');
        document.getElementById('mode-manual').classList.toggle('active', mode === 'manual');
        document.getElementById('manual-inputs-container').style.display = (mode === 'manual') ? 'flex' : 'none';
    }

    function generateManualInputs() {
        const qty = document.getElementById('accQuantity').value;
        const container = document.getElementById('manual-inputs-container');
        container.innerHTML = '';
        for(let i=0; i<qty; i++) {
            container.innerHTML += `
                <div class="manual-row">
                    <input type="text" id="fname-${i}" placeholder="First Name ${i+1}" autocomplete="off">
                    <input type="text" id="lname-${i}" placeholder="Last Name ${i+1}" autocomplete="off">
                </div>
            `;
        }
    }

    async function generateBatch() {
        if (batchesLeft <= 0) return;
        const status = document.getElementById('status');
        const btn = document.getElementById('genBtn');
        const domainChoice = document.getElementById('domainChoice').value;
        const yearChoice = document.getElementById('yearChoice').value;
        const quantity = parseInt(document.getElementById('accQuantity').value);
        
        btn.disabled = true;
        status.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Initializing...`;
        
        for (let i = 0; i < quantity; i++) {
            status.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Account ${i+1}/${quantity}...`;
            let queryParams = `?domain=${domainChoice}&years=${yearChoice}`;
            if(currentMode === 'manual') {
                const fn = document.getElementById(`fname-${i}`).value || 'User';
                const ln = document.getElementById(`lname-${i}`).value || 'Manual';
                queryParams += `&fname=${encodeURIComponent(fn)}&lname=${encodeURIComponent(ln)}`;
            }
            try {
                const res = await fetch(`/.netlify/functions/register${queryParams}`);
                const data = await res.json();
                if (data.status === "FB_CREATED") {
                    accounts.unshift({
                        name: data.name, email: data.email, pass: data.password,
                        uid: data.fb_id, gender: data.gender, bday: data.birthday, otp: "---",
                        timestamp: new Date().getTime()
                    });
                    saveToStorage(); render();
                }
            } catch (e) { console.error(e); }
        }
        
        batchesLeft--;
        localStorage.setItem('batches_left', batchesLeft);
        status.innerHTML = `<i class="fas fa-check-circle"></i> Batch Completed!`;
        if (batchesLeft <= 0) startCooldown(30 * 60, true);
        else startCooldown(2 * 60, false);
    }

    function startCooldown(seconds, isLong) {
        const endTime = Date.now() + (seconds * 1000);
        localStorage.setItem('cooldown_end', endTime);
        localStorage.setItem('is_long_cooldown', isLong);
        runTimer(endTime, isLong);
    }

    function checkCooldownOnLoad() {
        const endTime = localStorage.getItem('cooldown_end');
        const isLong = localStorage.getItem('is_long_cooldown') === 'true';
        if (endTime) {
            const remaining = Math.floor((parseInt(endTime) - Date.now()) / 1000);
            if (remaining > 0) runTimer(parseInt(endTime), isLong);
            else { 
                localStorage.removeItem('cooldown_end'); 
                if(isLong) { batchesLeft = 5; localStorage.setItem('batches_left', 5); }
                updateButtonText();
            }
        }
    }

    function runTimer(endTime, isLong) {
        const btn = document.getElementById('genBtn');
        const btnText = document.getElementById('btnText');
        const longWait = document.getElementById('longWait');
        const longTimer = document.getElementById('longTimer');
        btn.disabled = true;
        if (isLong) longWait.style.display = "block";

        const interval = setInterval(() => {
            const now = Date.now();
            const remaining = Math.floor((endTime - now) / 1000);
            if (remaining <= 0) {
                clearInterval(interval);
                btn.disabled = false;
                longWait.style.display = "none";
                if (isLong) { batchesLeft = 5; localStorage.setItem('batches_left', 5); }
                localStorage.removeItem('cooldown_end');
                localStorage.removeItem('is_long_cooldown');
                updateButtonText();
                return;
            }
            const mins = Math.floor(remaining / 60);
            const secs = remaining % 60;
            const timeStr = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if (isLong) { longTimer.innerText = timeStr; btnText.innerText = "LIMIT REACHED"; }
            else btnText.innerText = `WAIT ${timeStr}`;
        }, 1000);
    }

    function saveToStorage() { localStorage.setItem('fb_history', JSON.stringify(accounts.slice(0, 100))); }
    function clearHistory() { if(confirm("Clear all?")) { accounts = []; localStorage.removeItem('fb_history'); render(); } }
    function updateButtonText() { document.getElementById('btnText').innerText = `GENERATE (${batchesLeft} REMAINING)`; }

    function render() {
        const list = document.getElementById('account-list');
        list.innerHTML = accounts.map((a, i) => `
            <div class="account-card">
                <div class="card-header"><span class="name">${a.name}</span><span id="otp-${i}" class="otp-badge">${a.otp}</span></div>
                <div class="details">
                    <div><i class="fas fa-venus-mars icon-w"></i> ${a.gender} | <i class="fas fa-calendar-alt icon-w"></i> ${a.bday}</div>
                    <div><i class="fas fa-envelope icon-w"></i> <b>Email:</b> ${a.email} <i class="fas fa-copy copy-inline" onclick="copyText('${a.email}')"></i></div>
                    <div><i class="fas fa-key icon-w"></i> <b>Pass:</b> ${a.pass} <i class="fas fa-copy copy-inline" onclick="copyText('${a.pass}')"></i></div>
                    <div><i class="fas fa-fingerprint icon-w"></i> <b>UID:</b> ${a.uid} <i class="fas fa-copy copy-inline" onclick="copyText('${a.uid}')"></i></div>
                </div>
                <div class="card-actions">
                    <button class="visit-btn" onclick="window.open('https://www.facebook.com/${a.uid}', '_blank')"><i class="fas fa-external-link-alt"></i> VISIT</button>
                    <button id="btn-${i}" class="otp-btn" onclick="getOTP(${i})" ${a.otp !== '---' ? 'style="display:none"' : ''}><i class="fas fa-envelope-open-text"></i> GET OTP</button>
                </div>
            </div>
        `).join('');
    }

    function copyText(text) { navigator.clipboard.writeText(text); }

    async function getOTP(index) {
        const display = document.getElementById(`otp-${index}`);
        const btn = document.getElementById(`btn-${index}`);
        const email = accounts[index].email;
        let count = 0;
        btn.disabled = true;
        const poll = async () => {
            display.innerText = "WAIT";
            try {
                const res = await fetch(`/.netlify/functions/get-otp?email=${email}`);
                const data = await res.json();
                if (data.status === "SUCCESS") {
                    display.innerText = data.otp; accounts[index].otp = data.otp;
                    saveToStorage(); btn.style.display = "none";
                } else if (count < 20) { count++; setTimeout(poll, 5000); }
                else { display.innerText = "FAIL"; btn.disabled = false; }
            } catch (e) { display.innerText = "ERR"; }
        };
        poll();
    }

    function formatAccounts() { return accounts.map(a => `Uid: ${a.uid}\nEmail: ${a.email}\nPassword: ${a.pass}`).join('\n\n'); }
    function copyAllAccounts() { if (accounts.length === 0) return; navigator.clipboard.writeText(formatAccounts()); alert("Copied!"); }
    function downloadAccounts() {
        if (accounts.length === 0) return;
        const blob = new Blob([formatAccounts()], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `FB_Accounts.txt`; a.click();
    }
</script>
</body>
</html>
